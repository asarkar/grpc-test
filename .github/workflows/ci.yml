name: CI
on: [push, workflow_dispatch]

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version-file: ".java-version"

      - name: Build and test
        run: ./gradlew clean test

      - name: Lint
        run: ./gradlew check -x test
