name: Publish
on:
  workflow_dispatch:

jobs:
  CheckCI:
    runs-on: ubuntu-latest
    outputs:
      conclusion: ${{ steps.check.outputs.conclusion }}
    steps:
      - name: Check latest CI on main
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          conclusion=$(gh run list \
            --repo "${{ github.repository }}" \
            --workflow=ci.yml \
            --branch=main \
            --limit=1 \
            --json conclusion \
            --jq '.[0].conclusion')
          echo "Latest CI conclusion: $conclusion"
          echo "conclusion=$conclusion" >> "$GITHUB_OUTPUT"

  Publish:
    needs: CheckCI
    if: needs.CheckCI.outputs.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version-file: ".java-version"

      - name: Publish to Maven Central
        run: |
          ./gradlew -P signingInMemoryKey=${{ secrets.SIGNING_KEY }} \
            -P signingInMemoryKeyPassword=${{ secrets.SIGNING_KEY_PASSPHRASE }} \
            -P mavenCentralUsername=${{ secrets.SONATYPE_USERNAME }} \
            -P mavenCentralPassword=${{ secrets.SONATYPE_PASSWORD }} \
            publishAndReleaseToMavenCentral --no-configuration-cache
